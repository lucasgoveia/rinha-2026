services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "30m"

  api1:
    build: .
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "160m"

  api2:
    build: .
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "160m"

networks:
  rinha:
    driver: bridge
