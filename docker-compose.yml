services:
  lb:
    image: docker.io/goveialucas/rinha-2026-lb:871813d
    volumes:
      - sock:/run/sock
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    networks:
      - rinha
    restart: always
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "30m"

  api1:
    image: docker.io/goveialucas/rinha-2026:871813d
    environment:
      SOCK: /run/sock/api1.sock
    volumes:
      - sock:/run/sock
    networks:
      - rinha
    restart: always
    ulimits:
      nofile:
        soft: 16384
        hard: 16384
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160m"

  api2:
    image: docker.io/goveialucas/rinha-2026:871813d
    environment:
      SOCK: /run/sock/api2.sock
    volumes:
      - sock:/run/sock
    networks:
      - rinha
    restart: always
    ulimits:
      nofile:
        soft: 16384
        hard: 16384
      memlock:
        soft: -1
        hard: -1
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "160m"

networks:
  rinha:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "65535"

volumes:
  sock:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: uid=0,gid=0
