services:
  lb:
    image: docker.io/library/haproxy:alpine
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sock:/run/sock
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    networks:
      - rinha
    restart: always
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    sysctls:
      - net.core.somaxconn=65535
      - net.ipv4.tcp_syncookies=0
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "30m"

  api1:
    build: .
    environment:
      SOCK: /run/sock/api1.sock
    volumes:
      - sock:/run/sock
    networks:
      - rinha
    restart: always
    ulimits:
      nofile:
        soft: 16384
        hard: 16384
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "160m"

  api2:
    build: .
    environment:
      SOCK: /run/sock/api2.sock
    volumes:
      - sock:/run/sock
    networks:
      - rinha
    restart: always
    ulimits:
      nofile:
        soft: 16384
        hard: 16384
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "160m"

networks:
  rinha:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: "65535"

volumes:
  sock:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: uid=0,gid=0
