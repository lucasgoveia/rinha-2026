services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "30m"

  api1:
    build: .
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "160m"

  api2:
    build: .
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    networks:
      - rinha
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: "160m"

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
    networks:
      - rinha

networks:
  rinha:
    driver: bridge
